services:
  - type: web
    name: mino-signaling
    runtime: node
    plan: free
    region: singapore
    rootDir: render_server
    buildCommand: npm install --omit=dev
    startCommand: node src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080

