name: mino_chat
description: "Mino Chat — an immersive, minimal & cute chat app. Online + offline mesh, live audio/video, voice notes, file sharing, and more. Made by Lost Weeds (Abhinit), owned by X Hub."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.6.0

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.3.0

  # Networking / Realtime
  web_socket_channel: ^3.0.0
  dio: ^5.5.0+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^10.3.1

  # Auth / crypto
  google_sign_in: ^7.2.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pinenacl: ^0.6.0
  sign_in_with_apple: ^8.1.0

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1
  adaptive_theme: ^3.6.0
  heroicons: ^0.11.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^12.0.0-beta.7
  video_player: ^2.9.1
  chewie: ^1.8.1
  audioplayers: ^6.8.0
  record: ^7.1.0
  flutter_sound: ^9.10.5
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  audio_waveforms: ^2.0.2
  photo_view: ^0.15.0
  image_cropper: ^12.2.1

  # Files
  mime: ^2.0.0
  path: ^1.9.0
  open_filex: ^4.4.0
  share_plus: ^13.1.0
  filesystem_picker: ^4.1.0
  cross_file: ^0.3.4+1

  # Permissions / device
  permission_handler: ^12.0.3
  device_info_plus: ^13.1.0
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0

  # Notifications
  flutter_local_notifications: ^22.0.1
  firebase_messaging: ^16.4.1
  firebase_core: ^4.11.0

  # Live / calls
  flutter_webrtc: ^0.12.12+hotfix.1
  livekit_client: ^2.3.0

  # Bluetooth / offline
  flutter_blue_plus: ^2.3.9
  nearby_connections: ^4.0.1
  network_info_plus: ^8.1.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.0
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  logger: ^2.4.0
  validators: ^3.0.0
  url_launcher: ^6.3.0
  emoji_picker_flutter: ^4.4.0
  flutter_linkify: ^6.0.0
  sticky_headers: ^0.3.0+2
  scroll_to_index: ^3.0.1
  visibility_detector: ^0.4.0+2
  diffutil_dart: ^5.0.0
  rxdart: ^0.28.0

  # Markdown / rich content
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2

  # Stories / status
  story: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/sounds/
  fonts:
    - family: PlusJakarta
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#FAF9F6"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  android: true
  ios: false
  color: "#FAF9F6"
  image: assets/images/logo.png
  android_12:
    color: "#FAF9F6"
    icon: assets/images/logo.png
